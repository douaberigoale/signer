services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdfpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pdfdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdfuser} -d ${POSTGRES_DB:-pdfdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: douaberigoale/signer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pdfuser}:${POSTGRES_PASSWORD:-pdfpassword}@db:5432/${POSTGRES_DB:-pdfdb}
      STORAGE_DIR: /storage
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
    volumes:
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
