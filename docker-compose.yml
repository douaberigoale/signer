services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdfpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pdfdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdfuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pdfuser}:${POSTGRES_PASSWORD:-pdfpassword}@db:5432/${POSTGRES_DB:-pdfdb}
      STORAGE_DIR: /storage
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_HOST: backend
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
